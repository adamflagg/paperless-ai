version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: America/New_York
    commit-message:
      prefix: 'fix(deps)'
      prefix-development: 'chore(deps-dev)'
    groups:
      npm-prod:
        dependency-type: production
        update-types: ['minor', 'patch']
      npm-dev:
        dependency-type: development
        update-types: ['minor', 'patch']
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'fix(docker)'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(ci)'
    groups:
      actions:
        patterns: ['*']

name: Close stale issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been automatically marked as stale due to inactivity. It will be closed in 14 days if no further activity occurs.'
          stale-pr-message: 'This PR has been automatically marked as stale due to inactivity. It will be closed in 30 days if no further activity occurs.'
          days-before-issue-stale: 30
          days-before-pr-stale: 60
          days-before-issue-close: 14
          days-before-pr-close: 30
          exempt-issue-labels: 'bug,security,wontfix,pinned'
          exempt-pr-labels: 'security,pinned,work-in-progress'
          only-issues: false
